name: Skills Installer Top 10

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: true
        default: install-all
        type: choice
        options:
          - install-all
          - verify-only

jobs:
  install-all-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT4 }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install skills CLI
        run: npm install -g skills

      - name: Install orchestration skills
        run: |
          npx skills add obra/superpowers -a claude-code --non-interactive || true

      - name: Install supabase skills
        run: |
          npx skills add supabase/agent-skills -a claude-code --non-interactive || true

      - name: Install firecrawl skills
        run: |
          npx skills add firecrawl/cli -a claude-code --non-interactive || true

      - name: Install browser-use skills
        run: |
          npx skills add browser-use/browser-use -a claude-code --non-interactive || true

      - name: Install frontend skills
        run: |
          npx skills add vercel-labs/agent-skills -a claude-code --non-interactive || true

      - name: Install marketing skills
        run: |
          npx skills add coreyhaines31/marketingskills -a claude-code --non-interactive || true

      - name: Verify installed skills
        run: |
          echo "=== Installed Skills ==="
          find . -name "SKILL.md" -path "*/.claude/*" | sort
          echo "=== Count ==="
          find . -name "SKILL.md" -path "*/.claude/*" | wc -l

      - name: Commit to this repo
        run: |
          git config user.name "skills-scout[bot]"
          git config user.email "skills-scout@biddeed.ai"
          git add -A
          git diff --staged --quiet || git commit -m "feat(skills): install top 10 assessed skills from skills.sh (Agent 17)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT4 }}

      - name: Install to other repos
        run: |
          REPOS="biddeed-ai biddeed-ai-ui zonewise-web zonewise-scraper-v4"
          for repo in $REPOS; do
            echo "--- Installing to $repo ---"
            git clone "https://x-access-token:${{ secrets.GH_PAT4 }}@github.com/breverdbidder/${repo}.git" "/tmp/${repo}" || continue
            cd "/tmp/${repo}"
            
            npx skills add obra/superpowers -a claude-code --skill systematic-debugging --non-interactive || true
            
            if [ "$repo" = "biddeed-ai" ]; then
              npx skills add supabase/agent-skills -a claude-code --non-interactive || true
            fi
            if [ "$repo" = "biddeed-ai-ui" ] || [ "$repo" = "zonewise-web" ]; then
              npx skills add vercel-labs/agent-skills -a claude-code --non-interactive || true
              npx skills add coreyhaines31/marketingskills -a claude-code --skill seo-audit --non-interactive || true
            fi
            if [ "$repo" = "zonewise-web" ]; then
              npx skills add coreyhaines31/marketingskills -a claude-code --skill programmatic-seo --non-interactive || true
            fi
            if [ "$repo" = "zonewise-scraper-v4" ]; then
              npx skills add firecrawl/cli -a claude-code --non-interactive || true
              npx skills add browser-use/browser-use -a claude-code --non-interactive || true
            fi
            
            git config user.name "skills-scout[bot]"
            git config user.email "skills-scout@biddeed.ai"
            git add -A
            git diff --staged --quiet || git commit -m "feat(skills): install assessed skills (Agent 17)"
            git push || true
            cd /tmp
            echo "Done: $repo"
          done

      - name: Telegram notification
        if: always()
        run: |
          SKILL_COUNT=$(find . -name "SKILL.md" -path "*/.claude/*" | wc -l)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}"             -d parse_mode="HTML"             -d text="<b>Agent 17 Skills Installer</b>

Status: ${{ job.status }}
Skills in HQ: ${SKILL_COUNT}
Repos updated: cli-anything + biddeed-ai + biddeed-ai-ui + zonewise-web + zonewise-scraper-v4

Top 10 skills from skills.sh adopted.
Cost: 0.00"
