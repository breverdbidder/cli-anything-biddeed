name: Auction Morning Analysis
on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Auction date or sample'
        required: false
        default: 'sample'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          pip install click prompt-toolkit httpx python-docx
          pip install -e shared/ && pip install -e auction/agent-harness/
      - name: Analyze
        run: |
          cli-anything-auction --json discover upcoming
          cli-anything-auction --json analyze batch --date ${{ github.event.inputs.date || 'sample' }}
          mkdir -p reports/
          cli-anything-auction report batch --date ${{ github.event.inputs.date || 'sample' }} -o reports/ --format text
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: auction-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30
