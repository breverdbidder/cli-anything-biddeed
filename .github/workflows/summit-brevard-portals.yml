name: "Summit: Brevard Portal Scrape — Melbourne + All"
on:
  workflow_dispatch: {}

jobs:
  conquer:
    name: "Portal Scrape All Municipalities"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx shapely pyproj
      - name: "Execute Portal Scrape"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/brevard_portal_scrape_all.py
