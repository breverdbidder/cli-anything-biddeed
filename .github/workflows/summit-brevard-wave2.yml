name: "Summit: Brevard Wave 2 — All Remaining Municipalities"
on:
  workflow_dispatch: {}

jobs:
  conquer:
    name: "AGOL Extract + Conquer All"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx shapely
      - name: "Execute Wave 2 Conquest"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/brevard_wave2_conquest.py
      - uses: actions/upload-artifact@v4
        with:
          name: wave2-results
          path: wave2_results.json
          retention-days: 90
