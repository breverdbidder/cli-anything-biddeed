name: "Summit: Librarian Context Manager"
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - diagnose
          - install-only

jobs:
  librarian-build:
    name: "Build Librarian Harness on Hetzner"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: "SSH into Hetzner & Execute"
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 87.99.129.125
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 170m
          script: |
            set -euo pipefail
            echo "=== Summit: Librarian Context Manager ==="
            echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Mode: ${{ github.event.inputs.mode }}"

            # === PHASE 0: Ensure Node.js + Claude CLI ===
            echo "=== Phase 0: Environment Bootstrap ==="

            if ! command -v node &>/dev/null; then
              echo "Installing Node.js 20 LTS..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
              echo "Node: $(node --version)"
              echo "npm: $(npm --version)"
            else
              echo "Node already installed: $(node --version)"
            fi

            mkdir -p /root/.npm-global
            npm config set prefix '/root/.npm-global'
            export PATH="/root/.npm-global/bin:$PATH"

            if ! command -v claude &>/dev/null; then
              echo "Installing Claude Code CLI..."
              npm install -g @anthropic-ai/claude-code 2>&1 | tail -10
            fi

            CLAUDE_BIN=$(which claude)
            echo "Claude CLI: $CLAUDE_BIN"
            $CLAUDE_BIN --version 2>&1 || true

            # === DIAGNOSE MODE ===
            if [ "${{ github.event.inputs.mode }}" = "diagnose" ]; then
              echo "=== DIAGNOSE MODE ==="
              echo "--- Environment ---"
              echo "Node: $(node --version)"
              echo "npm: $(npm --version)"
              echo "Claude: $($CLAUDE_BIN --version 2>&1)"
              echo "CLIProxyAPI: $(curl -s http://127.0.0.1:8317/health 2>/dev/null || echo 'not running')"
              echo "Docker: $(docker ps --format '{{.Names}}' 2>/dev/null || echo 'N/A')"
              echo "Disk: $(df -h / | tail -1)"
              echo "Memory: $(free -h | grep Mem)"

              echo "--- Claude Auth Status ---"
              ls -la /root/.claude* 2>/dev/null || echo "No .claude config found in /root"
              ls -la /home/*/.claude* 2>/dev/null || echo "No .claude config found in /home"
              cat /root/.claude/.credentials.json 2>/dev/null | head -5 || echo "No credentials file"
              echo "ANTHROPIC_API_KEY set: ${ANTHROPIC_API_KEY:+YES}" || echo "ANTHROPIC_API_KEY: NOT SET"

              echo "--- Previous Build Log ---"
              if [ -f /tmp/librarian-build.log ]; then
                echo "Log size: $(wc -l < /tmp/librarian-build.log) lines"
                cat /tmp/librarian-build.log
              else
                echo "No build log found at /tmp/librarian-build.log"
              fi

              echo "--- Repo Status ---"
              if [ -d /opt/cli-anything-biddeed ]; then
                cd /opt/cli-anything-biddeed
                echo "Last commit: $(git log -1 --oneline 2>/dev/null || echo 'N/A')"
                echo "Branch: $(git branch --show-current 2>/dev/null || echo 'N/A')"
                echo "Remote: $(git remote -v 2>/dev/null | head -1)"
              else
                echo "Repo not cloned yet"
              fi
              exit 0
            fi

            # === INSTALL-ONLY MODE ===
            if [ "${{ github.event.inputs.mode }}" = "install-only" ]; then
              echo "=== INSTALL-ONLY: Environment ready ==="
              exit 0
            fi

            # === PHASE 1: Repo Setup ===
            echo "=== Phase 1: Repo Setup ==="
            REPO_DIR="/opt/cli-anything-biddeed"
            if [ -d "$REPO_DIR" ]; then
              cd "$REPO_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://${{ secrets.GH_PAT }}@github.com/breverdbidder/cli-anything-biddeed.git "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            echo "Spec file present:"
            head -5 docs/plans/LIBRARIAN-001.md

            # === PHASE 2: Claude Code Execution ===
            echo "=== Phase 2: Claude Code Autonomous Build ==="
            cd "$REPO_DIR"

            $CLAUDE_BIN --enable-auto-mode \
              --print \
              "Read docs/plans/LIBRARIAN-001.md and implement the Librarian context manager harness. \
               Follow cli-anything HARNESS.md 7-phase pipeline. \
               All LLM calls via CLIProxyAPI at 127.0.0.1:8317. \
               Create Supabase chat_index table via REST API (URL: https://mocerqjnksmhcjzxrewo.supabase.co). \
               Run tests before committing. \
               Git remote is already configured with auth. \
               Push all changes to origin/main when done." \
              2>&1 | tee /tmp/librarian-build.log

            echo "=== Build Complete: $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="

      - name: "Notify via Telegram"
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🏔️ Summit: Librarian Context Manager
            Status: ${{ job.status }}
            Mode: ${{ github.event.inputs.mode }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
