name: "Summit: Cleanup + Refill Brevard"
on:
  workflow_dispatch: {}
jobs:
  cleanup:
    name: "Delete Bad Data + Dedup + Refill Gaps"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx shapely
      - name: "Execute Cleanup + Refill"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/brevard_cleanup_refill.py
