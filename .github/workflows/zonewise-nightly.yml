name: ZoneWise Nightly Scrape
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          pip install click prompt-toolkit httpx
          pip install -e shared/ && pip install -e zonewise/agent-harness/
      - name: Scrape Brevard (Tier 4 safe)
        run: cli-anything-zonewise --json county scrape --county brevard --tier 4
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
