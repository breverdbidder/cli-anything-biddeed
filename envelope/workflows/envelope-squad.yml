name: Envelope Squad - Weekly Pipeline
on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6AM UTC (1AM EST)
  workflow_dispatch:
    inputs:
      municipality:
        description: 'Target municipality (or "all")'
        required: false
        default: 'all'
      agents:
        description: 'Which agents to run (all, scout, surveyor, architect, renderer, inspector)'
        required: false
        default: 'all'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  # ━━━ Agent 1 + 2: Parallel Data Fetch ━━━
  fetch:
    name: "🔍📐 Scout + Surveyor (Parallel Fetch)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "🔍 Agent SCOUT: Extract zoning setbacks"
        if: contains(github.event.inputs.agents || 'all', 'scout') || contains(github.event.inputs.agents || 'all', 'all')
        run: |
          node agents/scout/zoning_scout.js \
            --municipality "${{ github.event.inputs.municipality || 'all' }}" \
            --output data/envelope-3d/zoning_raw.jsonl

      - name: "📐 Agent SURVEYOR: Extract parcel geometry"
        if: contains(github.event.inputs.agents || 'all', 'surveyor') || contains(github.event.inputs.agents || 'all', 'all')
        run: |
          node agents/surveyor/parcel_surveyor.js \
            --municipality "${{ github.event.inputs.municipality || 'all' }}" \
            --output data/envelope-3d/geometry_raw.jsonl

      - name: Upload fetch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fetch-data
          path: data/envelope-3d/
          retention-days: 7

  # ━━━ Agent 3: Compute Envelopes ━━━
  compute:
    name: "🏗️ Architect (Compute Envelopes)"
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download fetch data
        uses: actions/download-artifact@v4
        with:
          name: fetch-data
          path: data/envelope-3d/

      - name: "🏗️ Agent ARCHITECT: Compute building envelopes"
        run: |
          node agents/architect/envelope_compute.js \
            --zoning data/envelope-3d/zoning_raw.jsonl \
            --geometry data/envelope-3d/geometry_raw.jsonl \
            --output data/envelope-3d/envelopes_computed.jsonl

      - name: Upload computed envelopes
        uses: actions/upload-artifact@v4
        with:
          name: computed-envelopes
          path: data/envelope-3d/envelopes_computed.jsonl
          retention-days: 7

  # ━━━ Agent 5: QA Validation ━━━
  validate:
    name: "🔎 Inspector (QA Validation)"
    needs: compute
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download computed envelopes
        uses: actions/download-artifact@v4
        with:
          name: computed-envelopes
          path: data/envelope-3d/

      - name: "🔎 Agent INSPECTOR: Validate envelope data"
        run: |
          node agents/inspector/qa_inspector.js \
            --input data/envelope-3d/envelopes_computed.jsonl \
            --report reports/envelope-3d/qa_report.json

      - name: Check pass rate
        run: |
          PASS_RATE=$(cat reports/envelope-3d/qa_report.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(d['summary']['pass_rate'].replace('%',''))
          ")
          echo "QA Pass Rate: ${PASS_RATE}%"
          if (( $(echo "$PASS_RATE < 70" | bc -l) )); then
            echo "::warning::QA pass rate below 70% — review violations"
          fi

      - name: Upload QA report
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: reports/envelope-3d/qa_report.json
          retention-days: 30

  # ━━━ Load to Supabase ━━━
  load:
    name: "💾 Load to Supabase"
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download computed envelopes
        uses: actions/download-artifact@v4
        with:
          name: computed-envelopes
          path: data/envelope-3d/

      - name: "💾 Upsert to envelope_cache"
        run: |
          node agents/loader/supabase_loader.js \
            --input data/envelope-3d/envelopes_computed.jsonl \
            --table envelope_cache

  # ━━━ Agent 4: Sample Renders ━━━
  render:
    name: "🎨 Renderer (Sample Reports)"
    needs: compute
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download computed envelopes
        uses: actions/download-artifact@v4
        with:
          name: computed-envelopes
          path: data/envelope-3d/

      - name: "🎨 Agent RENDERER: Generate top 10 envelope reports"
        run: |
          node agents/renderer/render_samples.js \
            --input data/envelope-3d/envelopes_computed.jsonl \
            --output reports/envelope-3d/renders/ \
            --count 10

      - name: Upload render reports
        uses: actions/upload-artifact@v4
        with:
          name: envelope-renders
          path: reports/envelope-3d/renders/
          retention-days: 30

  # ━━━ Telegram Notification ━━━
  notify:
    name: "📱 Telegram Report"
    needs: [validate, load, render]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="✅ SUCCESS"
          if [ "${{ needs.validate.result }}" != "success" ] || [ "${{ needs.load.result }}" != "success" ]; then
            STATUS="❌ FAILED"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="🏗️ <b>Envelope Squad — Weekly Run</b>
${STATUS}
Municipality: ${{ github.event.inputs.municipality || 'all' }}
Run: <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Details</a>"
